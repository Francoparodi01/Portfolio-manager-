version: "3.9"

services:

  db:
    image: timescale/timescaledb:latest-pg16
    container_name: cocos_db
    restart: always
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio_secret
      POSTGRES_DB: portfolio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  scraper:
    build: .
    container_name: cocos_scraper
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./screenshots:/app/screenshots
      - secrets_data:/app/secrets
    deploy:
      resources:
        limits:
          cpus: "2.5"
          memory: 3G

  telegram_bot:
    build: .
    container_name: cocos_telegram_bot
    restart: always
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - secrets_data:/app/secrets
    command: ["python", "-m", "scripts.telegram_bot"]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  market_listener:
    build: .
    container_name: cocos_market_listener
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    command: ["python", "scripts/run_market_listener.py", "--poll-seconds", "90"]
    volumes:
      - ./logs:/app/logs
      - ./screenshots:/app/screenshots
      - secrets_data:/app/secrets
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  risk_guard:
    build: .
    container_name: cocos_risk_guard
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    command:
      [
        "python",
        "scripts/run_risk_guard.py",
        "--poll-seconds", "60",
        "--warning-pct", "-0.04",
        "--critical-pct", "-0.06",
        "--stop-near-pct", "0.02",
        "--dedup-minutes", "30"
      ]
    volumes:
      - ./logs:/app/logs
      - secrets_data:/app/secrets
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M

volumes:
  postgres_data:
  secrets_data:
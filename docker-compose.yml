services:




  # ── TimescaleDB ──────────────────────────────────────────────────────────────
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: cocos_db
    restart: unless-stopped

    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-portfolio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portfolio_secret}
      POSTGRES_DB:       ${POSTGRES_DB:-portfolio}

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    ports:
      - "127.0.0.1:5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portfolio} -d ${POSTGRES_DB:-portfolio}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

    networks:
      - cocos_net


  # ── Scraper + Scheduler ──────────────────────────────────────────────────────
  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cocos_scraper
    restart: unless-stopped

    env_file:
    - /.env

    depends_on:
      db:
        condition: service_healthy

    environment:
      # Broker
      COCOS_USERNAME: ${COCOS_USERNAME}
      COCOS_PASSWORD: ${COCOS_PASSWORD}

      # DB — hostname 'db' resuelve al servicio interno
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-portfolio}:${POSTGRES_PASSWORD:-portfolio_secret}@db:5432/${POSTGRES_DB:-portfolio}

      # Telegram
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}

      # Scraper tunables
      HEADLESS: ${HEADLESS:-true}
      RETRY_ATTEMPTS: ${RETRY_ATTEMPTS:-3}
      RETRY_BACKOFF_S: ${RETRY_BACKOFF_S:-5}
      TIMEOUT_MS: ${TIMEOUT_MS:-60000}
      MIN_CONFIDENCE_SCORE: ${MIN_CONFIDENCE_SCORE:-0.6}
      DOM_HASH_TOLERANCE: ${DOM_HASH_TOLERANCE:-0.85}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-300}
      SCREENSHOT_ON_FAILURE: ${SCREENSHOT_ON_FAILURE:-true}
      SCREENSHOT_DIR: /app/screenshots
      TELEGRAM_MFA_TIMEOUT: ${TELEGRAM_MFA_TIMEOUT:-120}

    volumes:
      - screenshots:/app/screenshots
      - logs:/app/logs

    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m

    networks:
      - cocos_net


volumes:
  postgres_data:
  screenshots:
  logs:


networks:
  cocos_net:
    driver: bridge

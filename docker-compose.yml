services:

  db:
    image: timescale/timescaledb:latest-pg16
    container_name: cocos_db
    restart: unless-stopped
    profiles:
      - localdb
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio_secret
      POSTGRES_DB: portfolio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio"]
      interval: 10s
      timeout: 5s
      retries: 10

  scraper:
    build: .
    container_name: cocos_scraper
    restart: always
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./screenshots:/app/screenshots
      - secrets_data:/app/secrets
    environment:
      TZ: America/Argentina/Buenos_Aires
    deploy:
      resources:
        limits:
          cpus: "2.5"
          memory: 3G

  telegram_bot:
    build: .
    container_name: cocos_telegram_bot
    restart: always
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - secrets_data:/app/secrets
    command: ["python", "scripts/telegram_bot.py"]
    environment:
      TZ: America/Argentina/Buenos_Aires
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

volumes:
  postgres_data:
  secrets_data:
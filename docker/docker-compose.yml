services:
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: cocos_db
    environment:
      POSTGRES_DB: cocos_inversiones
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped

  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cocos_scheduler
    depends_on:
      - timescaledb
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@timescaledb:5432/cocos_inversiones
    volumes:
      - ../:/app
    restart: always

volumes:
  timescale_data: